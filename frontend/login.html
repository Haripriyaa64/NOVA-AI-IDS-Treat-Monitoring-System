<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NOVA — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap"
    rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0a0a12;
      --surface: #13131f;
      --surface2: #1c1c2e;
      --border: rgba(255, 255, 255, 0.08);
      --accent: #7c6ff7;
      --accent2: #a78bfa;
      --accent3: #38bdf8;
      --text: #e8e8f0;
      --muted: #6b6b8a;
      --danger: #f87171;
      --success: #34d399;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Orbs */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(90px);
      opacity: 0.15;
      pointer-events: none;
    }

    .orb1 {
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, #7c6ff7, transparent);
      top: -200px;
      left: -100px;
      animation: drift 12s ease-in-out infinite alternate;
    }

    .orb2 {
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, #38bdf8, transparent);
      bottom: -150px;
      right: -80px;
      animation: drift 15s ease-in-out infinite alternate-reverse;
    }

    @keyframes drift {
      to {
        transform: translate(40px, 40px) scale(1.1);
      }
    }

    /* Card */
    .card {
      position: relative;
      z-index: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 44px 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 24px 64px rgba(0, 0, 0, 0.5);
      animation: slideUp 0.5s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Logo */
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 32px;
      justify-content: center;
    }

    .logo-dots {
      display: flex;
      gap: 5px;
    }

    .logo-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--accent2);
      animation: bounce 1.4s ease-in-out infinite;
    }

    .logo-dot:nth-child(2) {
      background: var(--accent3);
      animation-delay: 0.2s;
    }

    .logo-dot:nth-child(3) {
      background: #f472b6;
      animation-delay: 0.4s;
    }

    @keyframes bounce {

      0%,
      100% {
        transform: translateY(0)
      }

      50% {
        transform: translateY(-5px)
      }
    }

    .logo-text {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.5rem;
      letter-spacing: 0.15em;
      background: linear-gradient(135deg, var(--accent2), var(--accent3));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    h2 {
      font-family: 'Syne', sans-serif;
      font-size: 1.5rem;
      font-weight: 700;
      text-align: center;
      margin-bottom: 6px;
    }

    .subtitle {
      text-align: center;
      color: var(--muted);
      font-size: 0.85rem;
      margin-bottom: 30px;
    }

    /* Tabs */
    .tabs {
      display: flex;
      background: var(--surface2);
      border-radius: 12px;
      padding: 4px;
      margin-bottom: 28px;
    }

    .tab-btn {
      flex: 1;
      padding: 9px;
      border: none;
      border-radius: 9px;
      background: transparent;
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.88rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.25s;
    }

    .tab-btn.active {
      background: var(--accent);
      color: white;
      box-shadow: 0 4px 14px rgba(124, 111, 247, 0.35);
    }

    /* Form */
    .form {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    label {
      font-size: 0.78rem;
      font-weight: 500;
      color: var(--muted);
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    input {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 13px 16px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(124, 111, 247, 0.15);
    }

    input::placeholder {
      color: var(--muted);
    }

    /* Submit button */
    .btn-primary {
      margin-top: 6px;
      padding: 14px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: white;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.25s;
      box-shadow: 0 4px 20px rgba(124, 111, 247, 0.35);
      position: relative;
      overflow: hidden;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(124, 111, 247, 0.45);
    }

    .btn-primary:active {
      transform: translateY(0);
    }

    .btn-primary.loading {
      opacity: 0.7;
      pointer-events: none;
    }

    .btn-primary.loading::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.15), transparent);
      animation: shimmer 1s infinite;
    }

    @keyframes shimmer {
      from {
        transform: translateX(-100%)
      }

      to {
        transform: translateX(100%)
      }
    }

    /* Error / success messages */
    .alert {
      padding: 11px 14px;
      border-radius: 10px;
      font-size: 0.84rem;
      display: none;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(-4px)
      }

      to {
        opacity: 1;
        transform: none
      }
    }

    .alert.error {
      background: rgba(248, 113, 113, 0.1);
      border: 1px solid rgba(248, 113, 113, 0.3);
      color: var(--danger);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .alert.success {
      background: rgba(52, 211, 153, 0.1);
      border: 1px solid rgba(52, 211, 153, 0.3);
      color: var(--success);
      display: flex;
      align-items: center;
      gap: 8px;
    }
  </style>
</head>

<body>

  <div class="orb orb1"></div>
  <div class="orb orb2"></div>

  <div class="card">

    <div class="logo">
      <div class="logo-dots">
        <span class="logo-dot"></span>
        <span class="logo-dot"></span>
        <span class="logo-dot"></span>
      </div>
      <span class="logo-text">NOVA</span>
    </div>

    <h2>Welcome back</h2>
    <p class="subtitle">Sign in to continue your conversations</p>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('login')">Sign In</button>
      <button class="tab-btn" onclick="switchTab('register')">Create Account</button>
    </div>

    <!-- Alert box -->
    <div class="alert" id="alert"></div>

    <!-- Login Form -->
    <div class="form" id="loginForm">
      <div class="field">
        <label>Email</label>
        <input type="email" id="loginEmail" placeholder="you@example.com" autocomplete="email" />
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="loginPass" placeholder="••••••••" autocomplete="current-password"
          onkeydown="if(event.key==='Enter') submitLogin()" />
      </div>
      <button class="btn-primary" id="loginBtn" onclick="submitLogin()">Sign In</button>
    </div>

    <!-- Register Form -->
    <div class="form" id="registerForm" style="display:none">
      <div class="field">
        <label>Email</label>
        <input type="email" id="regEmail" placeholder="you@example.com" autocomplete="email" />
      </div>
      <div class="field">
        <label>Password <span style="font-size:0.72rem;color:var(--muted)">(min 6 chars)</span></label>
        <input type="password" id="regPass" placeholder="••••••••" autocomplete="new-password" />
      </div>
      <div class="field">
        <label>Confirm Password</label>
        <input type="password" id="regPassConfirm" placeholder="••••••••" autocomplete="new-password"
          onkeydown="if(event.key==='Enter') submitRegister()" />
      </div>
      <button class="btn-primary" id="registerBtn" onclick="submitRegister()">Create Account</button>
    </div>

  </div>

  <script>
    const API = "https://nova-ai-voice-assistant.onrender.com";

    // Already logged in? → go straight to app
    if (localStorage.getItem("nova_token")) {
      window.location.href = "index.html";
    }

    function switchTab(tab) {
      const isLogin = tab === "login";
      document.getElementById("loginForm").style.display = isLogin ? "flex" : "none";
      document.getElementById("registerForm").style.display = isLogin ? "none" : "flex";
      document.querySelectorAll(".tab-btn")[0].classList.toggle("active", isLogin);
      document.querySelectorAll(".tab-btn")[1].classList.toggle("active", !isLogin);
      clearAlert();
    }

    function showAlert(msg, type = "error") {
      const el = document.getElementById("alert");
      el.textContent = (type === "error" ? "⚠️ " : "✅ ") + msg;
      el.className = `alert ${type}`;
    }

    function clearAlert() {
      document.getElementById("alert").className = "alert";
    }

    function setLoading(btnId, loading) {
      const btn = document.getElementById(btnId);
      btn.classList.toggle("loading", loading);
      btn.textContent = loading
        ? (btnId === "loginBtn" ? "Signing in…" : "Creating account…")
        : (btnId === "loginBtn" ? "Sign In" : "Create Account");
    }

    async function submitLogin() {
      const email = document.getElementById("loginEmail").value.trim();
      const password = document.getElementById("loginPass").value;

      if (!email || !password) return showAlert("Please fill in all fields.");

      setLoading("loginBtn", true);
      clearAlert();

      try {
        const res = await fetch(`${API}/login`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();

        if (!res.ok) return showAlert(data.detail || "Login failed.");

        localStorage.setItem("nova_token", data.token);
        localStorage.setItem("nova_email", data.email);
        localStorage.removeItem("nova_session_id");

        showAlert("Login successful! Redirecting…", "success");
        setTimeout(() => window.location.href = "index.html", 800);

      } catch (err) {
        showAlert("Cannot connect to server. Is the backend running?");
      } finally {
        setLoading("loginBtn", false);
      }
    }

    async function submitRegister() {
      const email = document.getElementById("regEmail").value.trim();
      const password = document.getElementById("regPass").value;
      const confirm = document.getElementById("regPassConfirm").value;

      if (!email || !password || !confirm) return showAlert("Please fill in all fields.");
      if (password !== confirm) return showAlert("Passwords do not match.");
      if (password.length < 6) return showAlert("Password must be at least 6 characters.");

      setLoading("registerBtn", true);
      clearAlert();

      try {
        const res = await fetch(`${API}/register`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();

        if (!res.ok) return showAlert(data.detail || "Registration failed.");

        localStorage.setItem("nova_token", data.token);
        localStorage.setItem("nova_email", data.email);

        showAlert("Account created! Redirecting…", "success");
        setTimeout(() => window.location.href = "index.html", 800);

      } catch (err) {
        showAlert("Cannot connect to server. Is the backend running?");
      } finally {
        setLoading("registerBtn", false);
      }
    }
  </script>

</body>

</html>
